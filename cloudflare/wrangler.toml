name = "bar-realtime"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# --- Durable Objects: หนึ่งร้าน = หนึ่ง BarRoom ---
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "BarRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BarRoom"]   # SQLite-backed DO (รองรับ WebSocket Hibernation + storage)

# --- D1: เก็บแค่ตาราง bars (ข้อมูลถาวร, ไม่ถูกลบรายคืน) ---
[[d1_databases]]
binding = "DB"
database_name = "bar-app"
database_id = "PUT-YOUR-D1-DATABASE-ID-HERE"   # ได้จาก `wrangler d1 create bar-app`

# --- Cron: เผื่อใช้ล้างข้อมูลแบบรวมศูนย์ (ทางเลือก; DO รีเซ็ตเองเมื่อขึ้นวันใหม่อยู่แล้ว) ---
[triggers]
crons = ["0 21 * * *"]   # 21:00 UTC = 04:00 เวลาไทย

# --- Secrets (อย่าใส่ค่าตรงนี้! ตั้งผ่าน `wrangler secret put`) ---
# QR_SECRET        — ใช้เซ็น token QR รายวัน
# SESSION_SECRET   — ใช้เซ็น session นิรนาม
[vars]
VENUE_TZ_OFFSET = "7"   # ชั่วโมงชดเชยเวลาไทย (UTC+7) ใช้คำนวณ "วัน" สำหรับรีเซ็ต
